<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="groq-api-key" content=" ">
    <title>StudyAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h1>StudyAI</h1>
            <button>Entrar</button>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>Estude de forma inteligente com IA</h2>
        <p>
            Organize suas tarefas, pesquise conteúdos e aprenda com inteligência artificial.
        </p>
        <button>Começar Agora</button>
    </section>

    <!-- DASHBOARD -->
    <main class="dashboard">

        <!-- ESTATÍSTICAS -->
        <section class="stats">
            <div class="card">
                <h3>Total de Tarefas</h3>
                <p id="total-tasks">0</p>
            </div>

            <div class="card">
                <h3>Concluídas</h3>
                <p id="completed-tasks">0</p>
            </div>

            <div class="card">
                <h3>Progresso</h3>
                <p id="progress">0%</p>
            </div>
        </section>

        <!-- CRUD TAREFAS -->
        <section class="tasks-section">
            <h2>Minhas Tarefas</h2>

            <div class="task-input">
                <input type="text" id="taskInput" placeholder="Digite uma tarefa...">
                <button id="addTask">Adicionar</button>
            </div>

            <ul id="taskList">
                <!-- Tarefas via JS -->
            </ul>
        </section>

        <!-- PESQUISA -->
        <section class="search-section">
            <h2>Pesquisar Conteúdo</h2>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ex: Fotossíntese, Revolução Francesa, DNA">
                <button id="searchBtn">Pesquisar</button>
            </div>

            <div id="searchResult">
                Resultado da pesquisa aparecerá aqui.
            </div>
        </section>

        <!-- IA -->
        <section class="ai-section">
            <h2>Tutor IA</h2>

            <textarea id="aiPrompt" placeholder="Ex: Explique SQL de forma simples"></textarea>

            <div class="ai-buttons">
                <button id="askAI">Perguntar à IA</button>
                <button id="generateQuiz">Gerar Quiz</button>
            </div>

            <div id="aiResponse">
                A resposta da IA aparecerá aqui.
            </div>
        </section>


    </main>

    <script>
        // Deixe vazio para evitar expor a chave no front-end.
        // Se precisar testar localmente, coloque sua chave apenas temporariamente.
        window.GROQ_API_KEY = "";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script src="js/groq.js"></script>
    <script src="js/quiz.js"></script>
</body>

</html>
